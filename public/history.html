
<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Orbit History</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg: #0f0f0f;
            --bg-panel: #161616;
            --accent: #dca83a;
            --txt: #f0f0f0;
            --txt-light: #ffffff;
            --stroke: #333333;
            --muted: #888888;
            --pill: #111111;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--txt);
            font-family: ui-monospace, monospace;
            padding: 20px;
        }

        .container { max-width: 800px; margin: 0 auto; }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--stroke);
            margin-bottom: 20px;
        }

        .back-link { color: var(--accent); text-decoration: none; font-size: 14px; }

        .history-item {
            background: var(--bg-panel);
            border: 1px solid var(--stroke);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
        }

        .meta { font-size: 10px; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; }
        .text { font-size: 14px; line-height: 1.5; margin-bottom: 8px; }
        .original { color: var(--txt-light); }
        .translated { color: var(--accent); font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>Transcription History</h2>
        <a href="index.html" class="back-link">← Back to Translator</a>
    </div>
    <div id="historyList">Loading history...</div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDBFlUQBJvboua_021Vj5iFYrKEs8pxOew",
        authDomain: "aitek2023-8f504.firebaseapp.com",
        databaseURL: "https://aitek2023-8f504-default-rtdb.firebaseio.com",
        projectId: "aitek2023-8f504",
        storageBucket: "aitek2023-8f504.appspot.com",
        messagingSenderId: "570516064142",
        appId: "1:570516064142:web:8a403c708e9732625886df"
    };
    firebase.initializeApp(firebaseConfig);

    const historyList = document.getElementById('historyList');

    // Wait for Auth to load to get the UID
    firebase.auth().onAuthStateChanged((user) => {
        if (user) {
            loadHistory(user.uid);
        } else {
            historyList.innerHTML = "Please sign in to view history.";
        }
    });

    function loadHistory(uid) {
        // We look at the 'General' room (or adjust logic as needed)
        const ref = firebase.database().ref('rooms/General/transcripts');
        
        ref.orderByChild('timestamp').limitToLast(50).on('value', (snapshot) => {
            historyList.innerHTML = "";
            const data = snapshot.val();
            
            if (!data) {
                historyList.innerHTML = "No history found.";
                return;
            }

            // Convert to array and reverse (newest first)
            const items = Object.values(data).reverse();
            
            items.forEach(item => {
                // Only show history for this user
                if (item.userId === uid) {
                    const div = document.createElement('div');
                    div.className = 'history-item';
                    const date = new Date(item.timestamp).toLocaleString();
                    
                    div.innerHTML = `
                        <div class="meta">${date} | Room: ${item.roomId} | User: ${item.userId}</div>
                        <div class="text original"><strong>Original:</strong> ${item.originalText}</div>
                        <div class="text translated"><strong>Translation:</strong> ${item.translatedText}</div>
                    `;
                    historyList.appendChild(div);
                }
            });
        });
    }
</script>

</body>
</html>
